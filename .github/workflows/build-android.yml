name: Build APK Android (Fiscais em Campo)

on:
  push:
    branches: [desenvolvimento]
    paths:
      - 'android/**'
      - 'src/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias e buildar o PWA
        run: |
          npm ci
          npm run build

      - name: Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar pacotes do Android SDK (platform 35 + build-tools)
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Sincronizar Capacitor com o build mais recente
        run: npx cap sync android

      - name: Ler versao do app
        id: appversion
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Compilar APK (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Renomear APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "dist-apk/auditoria-campo-v${{ steps.appversion.outputs.version }}-build${{ github.run_number }}.apk"

      - name: Publicar como GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.appversion.outputs.version }}-${{ github.run_number }}
          name: "Fiscais em Campo — APK de teste v${{ steps.appversion.outputs.version }} (build ${{ github.run_number }})"
          body: |
            APK de teste (assinatura debug do Android) gerado automaticamente a partir do branch `desenvolvimento`, commit ${{ github.sha }}.

            Instalação: baixe o `.apk` abaixo direto no celular Android, permita "instalar de fontes desconhecidas" quando pedido, e toque no arquivo pra instalar.

            Este build aponta para o ambiente de testes (`auditoria-campo-dev.onrender.com`) — não é a versão de produção.
          prerelease: true
          files: dist-apk/*.apk
